<svg xmlns="http://www.w3.org/2000/svg" width="720" height="200" viewBox="0 0 720 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DFFF00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DFFF00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>
  <!-- Infinity symbol stylized -->
  <path d="M 180 100 Q 220 60, 260 100 Q 300 140, 340 100 Q 380 60, 420 100 Q 460 140, 500 100" 
        fill="none" stroke="url(#grad)" stroke-width="18" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 180 100 Q 220 140, 260 100 Q 300 60, 340 100 Q 380 140, 420 100 Q 460 60, 500 100" 
        fill="none" stroke="#111" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <!-- Text -->
  <text x="520" y="90" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#DFFF00" letter-spacing="-1">Eternal Context</text>
  <text x="520" y="125" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="#F59E0B" letter-spacing="1">ENGINE</text>
  <text x="520" y="155" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#888" >ECE — Local • Private • Portable</text>
</svg>